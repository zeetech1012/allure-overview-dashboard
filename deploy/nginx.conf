# nginx.conf — serves the built dashboard AND proxies the Allure backend
# on the SAME origin, so the browser never hits CORS.
#
# Frontend calls relative paths:  fetch('/allure/projects')  ->  allure-docker-service
# Optional Huly bridge:           fetch('/api/huly/issue')   ->  huly-bridge service

server {
    listen 80;
    server_name _;

    # ---- 1. Static SPA (the Vite build) ----
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA fallback
    }

    # ---- 2. Allure backend (allure-docker-service) ----
    # Everything under /allure/ is forwarded to the allure container.
    # CONFIG.API_BASE in the frontend must be '/allure'  (relative, same origin).
    location /allure/ {
        # Forward to the EXISTING allure-docker-service at allure.nbfi.ru.
        # Its API + reports live under /allure-docker-service, so keep that prefix.
        # Frontend asks for /allure/projects -> allure.nbfi.ru/allure-docker-service/projects.
        proxy_pass            https://allure.nbfi.ru/allure-docker-service/;
        proxy_http_version    1.1;
        proxy_ssl_server_name on;                       # send SNI to the upstream vhost
        proxy_set_header      Host              allure.nbfi.ru;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
    }

    # ---- 3. (optional) Huly MCP bridge ----
    # Small backend that turns a failed run into a Huly issue on do.nbfi.ru.
    # The Huly token lives ONLY in that service, never in the frontend.
    location /api/ {
        proxy_pass         http://huly-bridge:8090/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
